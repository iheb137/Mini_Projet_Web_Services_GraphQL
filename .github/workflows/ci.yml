name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies - Gateway
        working-directory: urban-traffic-platform/services/gateway
        run: npm install --legacy-peer-deps

      - name: Install dependencies - Auth
        working-directory: urban-traffic-platform/services/auth
        run: npm install --legacy-peer-deps

      - name: Install dependencies - Vehicles
        working-directory: urban-traffic-platform/services/vehicles
        run: npm install --legacy-peer-deps

      - name: Install dependencies - Traffic
        working-directory: urban-traffic-platform/services/traffic
        run: npm install --legacy-peer-deps

      - name: Install dependencies - Incidents
        working-directory: urban-traffic-platform/services/incidents
        run: npm install --legacy-peer-deps

      - name: Install dependencies - Notifications
        working-directory: urban-traffic-platform/services/notifications
        run: npm install --legacy-peer-deps

      - name: Install dependencies - Frontend
        working-directory: urban-traffic-platform/frontend
        run: npm install --legacy-peer-deps

      - name: Build - Gateway
        working-directory: urban-traffic-platform/services/gateway
        run: npm run build

      - name: Build - Auth
        working-directory: urban-traffic-platform/services/auth
        run: npm run build

      - name: Build - Vehicles
        working-directory: urban-traffic-platform/services/vehicles
        run: npm run build

      - name: Build - Traffic
        working-directory: urban-traffic-platform/services/traffic
        run: npm run build

      - name: Build - Incidents
        working-directory: urban-traffic-platform/services/incidents
        run: npm run build

      - name: Build - Notifications
        working-directory: urban-traffic-platform/services/notifications
        run: npm run build

      - name: Build - Frontend
        working-directory: urban-traffic-platform/frontend
        run: npm run build

  docker-build:
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Docker images
        working-directory: urban-traffic-platform
        run: docker compose build

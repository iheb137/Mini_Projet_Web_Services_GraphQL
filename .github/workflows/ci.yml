name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install and Build - Gateway
        working-directory: urban-traffic-platform/services/gateway
        run: |
          npm install --legacy-peer-deps
          npm run build

      - name: Install and Build - Auth
        working-directory: urban-traffic-platform/services/auth
        run: |
          npm install --legacy-peer-deps
          npm run build

      - name: Install and Build - Vehicles
        working-directory: urban-traffic-platform/services/vehicles
        run: |
          npm install --legacy-peer-deps
          npm run build

      - name: Install and Build - Traffic
        working-directory: urban-traffic-platform/services/traffic
        run: |
          npm install --legacy-peer-deps
          npm run build

      - name: Install and Build - Incidents
        working-directory: urban-traffic-platform/services/incidents
        run: |
          npm install --legacy-peer-deps
          npm run build

      - name: Install and Build - Notifications
        working-directory: urban-traffic-platform/services/notifications
        run: |
          npm install --legacy-peer-deps
          npm run build

      - name: CI Success
        run: echo "? All services built successfully!"

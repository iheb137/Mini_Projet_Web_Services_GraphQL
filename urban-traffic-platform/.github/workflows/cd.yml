name: CD Pipeline

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          
      - name: Build and push all images with tag
        run: |
          TAG=${{ github.ref_name }}
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/urban-traffic-auth:$TAG ./services/auth
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/urban-traffic-vehicles:$TAG ./services/vehicles
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/urban-traffic-traffic:$TAG ./services/traffic
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/urban-traffic-incidents:$TAG ./services/incidents
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/urban-traffic-notifications:$TAG ./services/notifications
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/urban-traffic-gateway:$TAG ./gateway
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/urban-traffic-frontend:$TAG ./frontend
          
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/urban-traffic-auth:$TAG
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/urban-traffic-vehicles:$TAG
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/urban-traffic-traffic:$TAG
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/urban-traffic-incidents:$TAG
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/urban-traffic-notifications:$TAG
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/urban-traffic-gateway:$TAG
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/urban-traffic-frontend:$TAG
          
      - name: Deploy to Production
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd /opt/urban-traffic-platform
            git pull origin main
            TAG=${{ github.ref_name }} APP_IMAGE_TAG=${{ github.ref_name }} docker-compose pull
            TAG=${{ github.ref_name }} APP_IMAGE_TAG=${{ github.ref_name }} docker-compose up -d --no-build
